services:
  ollama:
    build:
      context: ./ollama
    container_name: ollama-service
    environment:
      - OLLAMA_PULL_MODEL=gemma3:4b
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-mcp:
    build:
      context: .
    container_name: ollama-mcp-service
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  ollama_data:
